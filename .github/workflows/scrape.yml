name: Scrape Fort Bend Motivated Seller Leads

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back (default: 7)"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    name: Scrape & Commit
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
      HEADLESS: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper/fetch.py

      - name: Commit updated records
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Actions"
          git add dashboard/records.json data/ || true
          git diff --staged --quiet || \
            git commit -m "chore: auto-update leads $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

  deploy:
    name: Deploy to GitHub Pages
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
